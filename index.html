<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARCADE VAULT</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Same CSS as before (I kept it short here) */
    :root {
      --bg: #05050f; --card: #11112a; --border: #1e1e45;
      --accent: #ff2d6b; --cyan: #00f5d4; --text: #e8e8ff;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin:0; padding:0; min-height:100vh; }
    header { text-align:center; padding:3rem 1rem; }
    header h1 { font-family:'Press Start 2P'; font-size:2.4rem; color:var(--accent); text-shadow:0 0 20px rgba(255,45,107,0.8); }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; padding:2rem; max-width:1400px; margin:0 auto; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; cursor:pointer; transition:0.3s; }
    .card:hover { transform:scale(1.05); border-color:var(--accent); }
    .card-thumb { width:100%; height:190px; object-fit:cover; }
    .card-info { padding:12px; }
    #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:10000; align-items:center; justify-content:center; }
    #popup.open { display:flex; }
  </style>
</head>
<body>

<header>
  <h1>ARCADE VAULT</h1>
  <p>INSERT COIN TO CONTINUE</p>
</header>

<div class="grid" id="game-grid"></div>

<div id="popup">
  <div id="emu-box" style="width:94vw; max-width:1000px; height:88vh; background:#000; border:3px solid #ff2d6b; border-radius:12px; overflow:hidden;">
    <div style="padding:10px 15px; background:#0a0a18; display:flex; justify-content:space-between; align-items:center;">
      <span id="emu-title" style="color:#ff2d6b; font-family:'Press Start 2P'; font-size:0.7rem;">LOADING...</span>
      <button onclick="closeGame()" style="background:#ff2d6b; color:white; border:none; padding:8px 14px; cursor:pointer; font-family:'Press Start 2P';">✕ QUIT</button>
    </div>
    <div id="loading-screen" style="position:absolute; inset:0; background:#000; display:none; flex-direction:column; align-items:center; justify-content:center; gap:15px; z-index:10;">
      <p style="color:#00f5d4; font-family:'Press Start 2P';">LOADING GAME...</p>
      <div style="width:280px; height:10px; background:#222; border-radius:5px; overflow:hidden;">
        <div style="height:100%; width:0%; background:#ff2d6b; animation: loading 3s linear forwards;"></div>
      </div>
    </div>
    <div id="game-player" style="height:calc(100% - 45px);"></div>
  </div>
</div>

<script>
// Games List
const GAMES = [
  {
    title: "Mortal Kombat 4",
    core: "pcsx_rearmed",
    romUrl: "games/mk4.bin",
    biosUrl: "bios/scph5501.bin",
    badge: "psx",
    label: "PSX",
    thumb: "https://picsum.photos/id/201/400/190"
  }
];

const grid = document.getElementById('game-grid');

GAMES.forEach(game => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <img class="card-thumb" src="${game.thumb}" onerror="this.src='https://picsum.photos/400/190'">
    <div class="card-info">
      <h3>${game.title}</h3>
      <span style="font-size:0.7rem; padding:3px 8px; background:#333; color:#0f0; border-radius:3px;">${game.label}</span>
    </div>
  `;
  card.onclick = () => playGame(game);
  grid.appendChild(card);
});

function playGame(g) {
  document.getElementById('popup').classList.add('open');
  document.getElementById('emu-title').textContent = g.title.toUpperCase();
  document.getElementById('loading-screen').style.display = 'flex';

  // Clean old emulator
  document.getElementById('game-player').innerHTML = '';
  const oldScript = document.getElementById('ejs-script');
  if (oldScript) oldScript.remove();

  window.EJS_player = "#game-player";
  window.EJS_core = g.core;
  window.EJS_gameUrl = g.romUrl;
  window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
  window.EJS_startOnLoad = true;
  if (g.biosUrl) window.EJS_biosUrl = g.biosUrl;

  const script = document.createElement("script");
  script.id = "ejs-script";
  script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
  document.body.appendChild(script);

  script.onload = () => {
    document.getElementById('loading-screen').style.display = 'none';
  };
}

function closeGame() {
  document.getElementById('popup').classList.remove('open');
  document.getElementById('loading-screen').style.display = 'none';
}
</script>
</body>
</html>
