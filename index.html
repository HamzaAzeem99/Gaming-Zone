<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS1 Game</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:black;
  overflow:hidden;
}
#game{
  width:100%;
  height:100vh;
}
</style>
</head>
<body>

<div id="game"></div>

<script>
EJS_player = "#game";
EJS_core = "psx";

/* IMPORTANT: correct stable EmulatorJS build */
EJS_pathtodata =
"https://ethanthesleepyone.github.io/EmulatorJS/stable/data/";

/* MUST BE .cue */
EJS_gameUrl =
"https://cdn.jsdelivr.net/gh/HamzaAzeem99/Gaming-Zone@main/Mortal%20Kombat%204%20(USA).cue";

EJS_volume = 1;
EJS_startOnLoaded = true;
</script>

<script src="https://ethanthesleepyone.github.io/EmulatorJS/stable/data/loader.js"></script>

</body>
</html>
