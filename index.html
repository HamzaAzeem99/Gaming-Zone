<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARCADE VAULT - MK4</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #05050f;
      --card: #11112a;
      --border: #1e1e45;
      --accent: #ff2d6b;
      --cyan: #00f5d4;
      --text: #e8e8ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 1rem;
    }

    header h1 {
      margin: 0;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      color: var(--accent);
      text-shadow: 0 0 20px rgba(255, 45, 107, 0.8);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      padding: 2rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(255, 45, 107, 0.35);
    }

    .card-thumb {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background: #000;
    }

    .card-info {
      padding: 16px;
      text-align: center;
    }

    .card-info h3 {
      margin: 0 0 10px;
      font-size: 1.4rem;
      letter-spacing: 1px;
    }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 4px 12px;
      border-radius: 4px;
      font-family: 'Press Start 2P', monospace;
      background: #222;
      color: #0f0;
    }

    #popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.98);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    #popup.open {
      display: flex;
    }

    #emu-box {
      width: 96vw;
      max-width: 1020px;
      height: 90vh;
      background: #000;
      border: 3px solid var(--accent);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .emu-bar {
      padding: 12px 16px;
      background: #0a0a18;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #emu-title {
      color: var(--accent);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.75rem;
    }

    .quit-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 14px;
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
    }

    #loading-screen {
      position: absolute;
      inset: 0;
      top: 48px;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
    }

    #loading-screen p {
      color: var(--cyan);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.8rem;
    }

    .bar {
      width: 280px;
      height: 12px;
      background: #222;
      border-radius: 6px;
      overflow: hidden;
    }

    .bar>div {
      height: 100%;
      width: 0%;
      background: var(--accent);
      animation: loading 5s linear forwards;
    }

    #game-player {
      height: calc(100% - 48px);
      width: 100%;
    }

    @keyframes loading {
      to { width: 98%; }
    }
  </style>
</head>

<body>

  <header>
    <h1>ARCADE VAULT</h1>
  </header>

  <div class="grid">
    <div class="card" onclick="playMK4()">
      <img class="card-thumb" src="https://cdn.wallpapersafari.com/98/82/dkMfnW.jpg" onerror="this.src='https://picsum.photos/400/200'">
      <div class="card-info">
        <h3>MORTAL KOMBAT 4</h3>
        <span class="badge">PSX</span>
      </div>
    </div>
  </div>

  <div id="popup">
    <div id="emu-box">
      <div class="emu-bar">
        <span id="emu-title">MORTAL KOMBAT 4</span>
        <button class="quit-btn" onclick="closeGame()">✕ QUIT</button>
      </div>
      <div id="loading-screen">
        <p>UNZIPPING & LOADING PSX CORE...</p>
        <div class="bar">
          <div></div>
        </div>
      </div>
      <div id="game-player"></div>
    </div>
  </div>

  <script>
    const popup = document.getElementById('popup');
    const loadingScreen = document.getElementById('loading-screen');
    const gamePlayer = document.getElementById('game-player');

    function loadEmulatorScript() {
      return new Promise((resolve, reject) => {
        const existing = document.getElementById('ejs-script');
        if (existing) existing.remove();

        const script = document.createElement('script');
        script.id = 'ejs-script';
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        script.crossOrigin = 'anonymous';
        script.onload = () => resolve();
        script.onerror = () => reject(new Error('Loader Failed'));
        document.body.appendChild(script);
      });
    }

    async function playMK4() {
      popup.classList.add('open');
      loadingScreen.style.display = 'flex';
      gamePlayer.innerHTML = '';

      for (let key in window) {
        if (key.startsWith('EJS_')) delete window[key];
      }

      window.EJS_player = "#game-player";
      window.EJS_core = "pcsx_rearmed";
      window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
      
      // Aapke folder ke mutabiq path update kar diya hai
      window.EJS_gameUrl = "/games/mk4.zip"; 
      
      // Emulator zip kholte hi pehle .cue parhay ga
      window.EJS_gameExt = "cue"; 
      
      window.EJS_gameID = "mk4-ps1-zip-vault";
      window.EJS_gameName = "Mortal Kombat 4";
      
      window.EJS_startOnLoad = true;
      window.EJS_loadContent = true;
      window.EJS_autoplay = true;

      try {
        await loadEmulatorScript();
        setTimeout(() => {
          loadingScreen.style.display = 'none';
        }, 3500);
      } catch (err) {
        loadingScreen.style.display = 'none';
        gamePlayer.innerHTML = `<div style="padding:20px;color:#ff8080;font-family:Arial,sans-serif;">Error loading emulator engine.</div>`;
      }
    }

    function closeGame() {
      popup.classList.remove('open');
      loadingScreen.style.display = 'none';
      gamePlayer.innerHTML = '';
      if (typeof EJS_Quit === 'function') {
        EJS_Quit();
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === "Escape") closeGame();
    });
  </script>

</body>

</html>
