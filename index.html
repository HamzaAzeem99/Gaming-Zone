<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade & Street Fighter Collection</title>
    <style>
        /* CSS Styling */
        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b16;
            color: white;
        }
        h1 {
            text-align: center;
            margin-top: 30px;
            color: #ff007f;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }
        .back-btn {
            display: inline-block;
            margin: 20px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            background: #222;
            padding: 10px 15px;
            border-radius: 5px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-div {
            background: #15152a;
            border: 2px solid #25254d;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s;
        }
        .game-div:hover {
            transform: translateY(-5px);
            border-color: #ff007f;
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.3);
        }
        .game-div img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .div-details {
            padding: 15px;
            text-align: center;
        }
        .div-details h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
        }
        .div-details span {
            color: #00ffcc;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* Emulator Popup Styling */
        #emulator-popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        #emulator-box {
            position: relative;
            width: 85%;
            height: 80%;
            background: #0f0f26;
            border: 2px solid #ff007f;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255,0,127,0.5);
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: #ff0055;
            color: white;
            border: none;
            padding: 8px 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            z-index: 10000;
        }
        #game-player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ HOME</a>

    <h1>STREET FIGHTER SERIES</h1>

    <div class="grid-container">





        <div class="game-div" onclick="playGame('psx', 'games/mk4.bin')">
            <img src="https://cdn.wallpapersafari.com/98/82/dkMfnW.jpg" alt="Capcom vs. SNK Pro">
            <div class="div-details">
                <h3>Mortal Kombat 4</h3>
                <span>PSX CORE</span>
            </div>
        </div>

    </div>

    <div id="emulator-popup">
        <div id="emulator-box">
            <button class="close-btn" onclick="closeGame()">❌ QUIT</button>
            <div id="game-player"></div>
        </div>
    </div>

    <script>
      function playGame(core, gameUrl) {
    const popup = document.getElementById('emulator-popup');
    const playerContainer = document.getElementById('game-player');

    if (!popup || !playerContainer) return;

    playerContainer.innerHTML = '';
    popup.style.display = 'flex';

    window.EJS_player = "#game-player";
    window.EJS_core = core;
    window.EJS_gameUrl = gameUrl; // Yahan ab direct .bin ka track load hoga
    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
    window.EJS_language = ""; 
    window.EJS_startOnLoad = true;

    if (core === "psx") {
        window.EJS_biosUrl = "bios/scph5501.bin";
    }

    const script = document.createElement('script');
    script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
    script.id = "emu-loader";
    playerContainer.appendChild(script);
}
        function closeGame() {
            const popup = document.getElementById('emulator-popup');
            const playerContainer = document.getElementById('game-player');

            if (popup) popup.style.display = 'none';
            if (playerContainer) {
                playerContainer.innerHTML = ''; // Stops game engine and audio instantly
            }
            
            // Remove previous window settings to clear memory
            delete window.EJS_core;
            delete window.EJS_gameUrl;
            delete window.EJS_biosUrl;
        }
    </script>

</body>
</html>
